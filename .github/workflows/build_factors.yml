name: Build Conversion Factors

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Which step to run'
        required: true
        default: 'fetch_stats'
        type: choice
        options:
          - fetch_stats
          - build_factors
          - run_model
          - run_stan_model
          - identify
          - patch_conflicts
          - team_sim
          - team_backtest
          - run_jpn_model
          - team_compare
          - statistical_validation

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install base dependencies
        run: pip install -r requirements.txt

      - name: Install pybaseball (fetch_stats / patch_conflicts)
        if: inputs.step == 'fetch_stats' || inputs.step == 'patch_conflicts'
        run: pip install pybaseball

      - name: Install pykakasi (patch_conflicts only)
        if: inputs.step == 'patch_conflicts'
        run: pip install pykakasi

      - name: Install PyMC + ArviZ (run_model only)
        if: inputs.step == 'run_model'
        run: pip install "pymc>=5.0" "arviz>=0.15"

      - name: Install cmdstanpy + ArviZ (run_stan_model / run_jpn_model)
        if: inputs.step == 'run_stan_model' || inputs.step == 'run_jpn_model'
        run: |
          pip install -r requirements-model.txt
          python -c "from cmdstanpy import install_cmdstan; install_cmdstan()"

      - name: Fetch previous-league stats via pybaseball
        if: inputs.step == 'fetch_stats'
        run: python scripts/fetch_prev_stats.py

      - name: Run identify_foreign_players
        if: inputs.step == 'identify'
        run: python src/identify_foreign_players.py

      - name: Run build_conversion_factors
        if: inputs.step == 'build_factors'
        run: python src/build_conversion_factors.py

      - name: Run Bayesian model (PyMC)
        if: inputs.step == 'run_model'
        run: python src/bayesian_model.py --draws 2000 --tune 1000

      - name: Run Stan model
        if: inputs.step == 'run_stan_model'
        run: python src/stan_model.py --draws 2000 --warmup 1000

      - name: Patch master conflicts (detect same-katakana different-player)
        if: inputs.step == 'patch_conflicts'
        run: python scripts/patch_master_conflicts.py

      - name: Run team standings simulation (Monte Carlo, N=10000)
        if: inputs.step == 'team_sim'
        run: python src/team_sim.py --n_sim 10000

      - name: Run team standings backtest (2018-2025, N=10000)
        if: inputs.step == 'team_backtest'
        run: python src/team_sim.py --n_sim 10000 --backtest

      - name: Run Japanese player Stan model (K%/BB% correction, 2022-2025 backtest)
        if: inputs.step == 'run_jpn_model'
        run: python src/stan_jpn_model.py --draws 2000 --warmup 1000

      - name: Run team-level Marcel vs Stan comparison
        if: inputs.step == 'team_compare'
        run: python src/team_compare.py

      - name: Run statistical validation (LOO-CV + significance tests)
        if: inputs.step == 'statistical_validation'
        run: python src/statistical_validation.py

      - name: Commit results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "CI: ${{ inputs.step }} — update data"
            git push
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-output
          path: data/
          retention-days: 30
